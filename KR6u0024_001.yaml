body:
  text: 爾時世尊在娑羅雙樹間臨般涅槃有四衆比丘比丘尼優婆塞優婆夷等皆來集會延壽䟡跪合掌前白佛言世尊我等四衆皆來集會奉請如來莫入涅槃唯願如來哀受我等勸請令住一劫莫入涅槃爾時世尊告延壽菩薩汝等諦聽吾當為汝分別已來經今四十九年教化衆生上至飛鳥下至蟻子蠢動含識有形無形四足兩足多足無足胎卵濕化如是衆生盡令遇善知識而登正覺與我今欲入涅槃本為波旬所請波旬我言瞿曇三界衆生盡受生死瞿曇今日若住一劫違我本願爾時我受波旬所請而入涅槃我違波旬豈是諸佛延壽菩薩白佛言世尊波旬外生壽諸佛涅槃擬為三界之主一切衆生盡入魔網無有休息從生死至生死從煩惱至煩惱常與魔為眷屬不遇正法又死入地獄千劫萬劫常無光明刀輪銅蛇鐵狗牛頭獄卒手如鋒刀利如霜雪終朝竟日共相撮挽恐怖無極無處藏隱不聞父母三寶名字一日之中千生萬死生從地獄出復受種種諸惡生身或作駱駝身或生驢中身常負重常因饑渴若生人中貧窮下賤為人所使衣不蓋形食不充口或有富貴而無男女或有貧窮而多子息或有衆生惡在床痿黃困篤篤連年纍月形消肉盡惡瘡膿血遍體常流人所惡賤或受盲聾瘖啞或百歲不死受苦或三十富貴早亡如是橫羅其殃並入魔網唯願如來令住一劫莫受波旬所請佛告延壽菩薩善男子我滅度後若有衆生受如是種種惡報但造延壽經一百卷乃至一卷兩卷譬如一人有力不如十人之力十人之力不如百人若造延壽經亦復如是但造此經散轉與人受持讀誦我當救護譬如慈母生一子子若得病慈母亦病子若得愈慈母亦愈若善男子一切衆生皆是吾子善願之者吾當舒金色譬以摩其頂隨其本願無不獲果爾時延壽菩薩以偈讚曰世尊具相真金色八十種好悉莊嚴四十九年大慈父波旬無故請涅槃寂滅如空不可見定知三界永無生佛法滅定起災殃魔王毒心競相向一切聲聞及菩薩一切人民四部衆法河涸竭法幢摧法山崩倒法船沒八國諸王皆自撲血汗流淚如暴雨何期大師入涅槃我等凡夫更久住聲聞緣覺稱善哉一切衆生失依附爾時衆中有大菩薩名曰普淨問延壽菩薩如來今日入涅槃將何付囑惡趣衆生令命長壽莫似如來三界第一而不住一劫爾時延壽白言普淨菩薩佛滅度後令寫延壽經一百卷散與衆生而共轉讀短命衆生令得長壽如來大慈舒金色臂為摩頂受記如來當自覆護爾時普淨讚言善哉善哉承如是言必非虛僞信受奉行
